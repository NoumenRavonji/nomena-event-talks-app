<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Stay up to date with the latest BigQuery release notes, announcements, features, and fixes — directly from Google Cloud." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Background canvas for animated particles -->
  <canvas id="bgCanvas"></canvas>

  <div class="app-shell">
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L44 36H4L24 4Z" fill="url(#lg1)" opacity="0.9"/>
            <circle cx="24" cy="32" r="8" fill="url(#lg2)"/>
            <defs>
              <linearGradient id="lg1" x1="4" y1="36" x2="44" y2="4" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4285F4"/>
                <stop offset="1" stop-color="#00C2FF"/>
              </linearGradient>
              <linearGradient id="lg2" x1="16" y1="40" x2="32" y2="24" gradientUnits="userSpaceOnUse">
                <stop stop-color="#34A853"/>
                <stop offset="1" stop-color="#00E5A0"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-product">BigQuery</span>
          <span class="logo-sub">Release Notes</span>
        </div>
      </div>

      <div class="sidebar-meta" id="sidebarMeta">
        <div class="meta-item">
          <span class="meta-label">Last fetched</span>
          <span class="meta-value" id="metaFetchedAt">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Feed updated</span>
          <span class="meta-value" id="metaFeedUpdated">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Entries loaded</span>
          <span class="meta-value" id="metaEntryCount">—</span>
        </div>
      </div>

      <div class="sidebar-filters">
        <p class="filter-label">Filter by type</p>
        <div class="filter-chips" id="filterChips">
          <button class="chip active" data-filter="all" id="chip-all">All</button>
          <button class="chip" data-filter="Feature" id="chip-Feature">Feature</button>
          <button class="chip" data-filter="Announcement" id="chip-Announcement">Announcement</button>
          <button class="chip" data-filter="Deprecation" id="chip-Deprecation">Deprecation</button>
          <button class="chip" data-filter="Issue" id="chip-Issue">Issue</button>
          <button class="chip" data-filter="Fix" id="chip-Fix">Fix</button>
          <button class="chip" data-filter="Changed" id="chip-Changed">Changed</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <a href="https://cloud.google.com/bigquery/docs/release-notes" target="_blank" rel="noopener" class="ext-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Full release notes
        </a>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">Release Notes</h1>
          <span class="topbar-badge" id="entryBadge">—</span>
        </div>
        <div class="topbar-right">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search release notes…" />
          </div>
          <button class="btn-export" id="exportBtn" title="Export current view to CSV">
            <svg class="export-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span class="btn-text">Export CSV</span>
          </button>
          <button class="btn-refresh" id="refreshBtn" title="Refresh feed">
            <svg class="refresh-icon" id="refreshIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            <span class="btn-text">Refresh</span>
          </button>
        </div>
      </header>

      <!-- Error banner -->
      <div class="error-banner" id="errorBanner" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorMsg"></span>
      </div>

      <!-- Skeleton / Loading -->
      <div class="skeleton-list" id="skeletonList" style="display:none">
        <div class="skeleton-card" aria-hidden="true"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
        <div class="skeleton-card" aria-hidden="true"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <p class="empty-title">No entries found</p>
        <p class="empty-sub">Try a different search term or filter.</p>
      </div>

      <!-- Feed list -->
      <div class="feed-list" id="feedList"></div>
    </main>
  </div>

  <!-- Tweet Modal -->
  <div class="modal-backdrop" id="tweetModal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title-row">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="x-logo"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L2.25 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
          <h2 class="modal-title" id="modalTitle">Tweet this update</h2>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>

      <div class="modal-body">
        <div class="tweet-composer">
          <div class="composer-avatar">BQ</div>
          <div class="composer-right">
            <textarea id="tweetText" class="tweet-textarea" rows="5" maxlength="280" spellcheck="true"></textarea>
            <div class="tweet-meta-row">
              <span class="char-count"><span id="charCount">0</span> / 280</span>
              <span class="tweet-hint">Edit before posting →</span>
            </div>
          </div>
        </div>

        <div class="modal-link-row" id="modalLinkRow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <a id="sourceLink" href="#" target="_blank" rel="noopener" class="source-link">View source entry</a>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-tweet" id="tweetSubmit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L2.25 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
          Post on X
        </button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
